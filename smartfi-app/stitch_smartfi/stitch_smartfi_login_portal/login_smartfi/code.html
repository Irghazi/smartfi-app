        body {

            -webkit-font-smoothing: antialiased;

<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center py-stack-lg px-margin-mobile md:px-0">
<!-- Top Navigation Bar (Shared Component Style) -->
<header class="fixed top-0 left-0 right-0 bg-background/80 backdrop-blur-md z-50">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
<div class="text-headline-md font-headline-md font-bold text-primary">SmartFi</div>
<div class="hidden md:flex gap-gutter">
<a class="text-label-md font-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Bantuan</a>
</div>
</div>
</header>
<main class="w-full max-w-[480px] mt-16 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Welcome Illustration -->

<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl login-card-shadow p-stack-lg border border-outline-variant/30">
<!-- Logo Section -->
<div class="flex justify-center mb-stack-lg">
<img alt="SmartFi Logo" class="h-48 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpv_7HHIq_HP81fmFmD4PRcn7mYmM9hz1GuUYqcobNOZ6o4MHtFL6AEwWzdeEFhvzLmuAodRZbJ7YfZrdm5zWBRzjRA_VVZBBVIyd39jcxEWf6ZCH5tCpm41NjvYy_kOdcg_G0WcwDsqMbwWWHpJcDooxFNdL03Skcc1x8x6bt6xMVUoAyhT_N5QnUywVnQbw9V0SRp_Wu5N0VlVkqXEZdPdG0GdvBQEV6eU2qJ61P5os955E5zt5qix4BtkJxNPYpXRM">
</div>
<div class="text-center mb-stack-lg">
<h1 class="text-headline-md font-headline-md text-on-surface mb-2">Selamat Datang Kembali</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Kelola finansial Anda dengan cerdas</p>
</div>
<!-- Login Form -->
<form class="space-y-gutter" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-base">
<label class="text-label-md font-label-md text-on-surface-variant" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-12 pl-10 pr-4 bg-background border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-body-md shadow-inner" id="email" placeholder="nama@email.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="text-label-md font-label-md text-on-surface-variant" for="password">Password</label>
<a class="text-label-sm font-label-sm text-primary hover:underline" href="#">Lupa Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-12 pl-10 pr-10 bg-background border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-body-md shadow-inner" id="password" placeholder="Masukkan password" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-12 bg-primary hover:bg-primary-container text-on-primary font-label-md rounded-lg shadow-sm transition-all active:scale-[0.98] shadow-lg" type="submit">
                    Masuk ke Akun
                </button>
<!-- Divider -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm uppercase">
<span class="bg-surface-container-lowest px-2 text-on-surface-variant font-label-sm">Atau</span>
</div>
</div>
<!-- Google Login Section -->
<div class="space-y-stack-md text-center">
<p class="text-body-md font-body-md text-on-surface-variant">Lanjutkan dengan Google?</p>
<button class="w-full h-12 flex items-center justify-center gap-3 border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low text-on-surface-variant font-label-md rounded-lg transition-all active:scale-[0.98] shadow-md" type="button">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Login dengan Google
                    </button>
</div>
</form>
<!-- Signup Footer -->
<div class="mt-stack-lg pt-stack-lg border-t border-outline-variant text-center">
<p class="text-body-md font-body-md text-on-surface-variant">
                    Belum punya akun? Ayo daftar
                </p>
<a class="inline-block mt-2 text-primary font-label-md hover:underline decoration-2 underline-offset-4" href="#">
                    Sign Up
                </a>
</div>
</div>
</main>
<!-- Footer (Shared Component Style) -->
<footer class="w-full px-margin-mobile md:px-margin-desktop py-stack-lg mt-stack-lg max-w-container-max mx-auto border-t border-outline-variant/30 flex flex-col md:flex-row justify-between items-center">
<div class="text-label-md font-label-md font-bold text-on-surface-variant mb-4 md:mb-0">© 2026 SmartFi. Seluruh hak cipta dilindungi.</div>
<div class="flex gap-stack-lg">
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Kebijakan Privasi</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Syarat &amp; Ketentuan</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Keamanan</a>
</div>
</footer>
<script>
        // Micro-interactions
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('mousedown', () => {
            loginBtn.classList.add('scale-95');
        });
        loginBtn.addEventListener('mouseup', () => {
            loginBtn.classList.remove('scale-95');
        });
        loginBtn.addEventListener('mouseleave', () => {
            loginBtn.classList.remove('scale-95');
        });

        // Simple input focus effects handled by Tailwind, 
        // but could add more JS here for validation or sophisticated UI feedback.
    </script>
